  <body>
    <header>
        <h1 class="heading-text-main">Student Registration System</h1>
    </header>
    <div class="action-header">

        <button id="do_active_create_student" class="btn1">New Student</button>
        <h2 class="">Student List</h2>
        <button id="do_active_update_student" class="btn1">Update Student</button>

    </div>

    <div class="container">
      <div class="form-section create_form_sec">
        <h2 class="heading-text">Create New Student</h2>

        <form id="create-form">
          <div class="field">
            <label for="student_name">Full Name</label>
            <input
              type="text"
              id="student_name"
              name="Name"
              placeholder="Enter your Full Name"
            />
          </div>

          <div class="field">
            <label for="student_id">Student ID</label>
            <input
              type="text"
              id="student_id"
              name="Student_ID"
              placeholder="Enter Student ID"
            />
          </div>

          <div class="field">
            <label for="student_email">Student Email</label>
            <input
              type="email"
              id="student_email"
              name="Email"
              placeholder="Enter Student Email"
            />
          </div>

          <div class="field">
            <label for="student_mobile">Mobile Number</label>
            <input
              type="tel"
              id="student_mobile"
              name="Mobile"
              placeholder="Enter Student Mobile Number"
            />
          </div>

          <button class="btn1" id="add_student_btn">Add Student</button>
        </form>
      </div>
      <div class="student-section">
        <h2 class="heading-text">Student List</h2>
        <div class="list" id="studentList">
          <div class="col-heading">
            <span class="std-name col-style">Name</span>
            <span class="std-id col-style">Std Id</span>
            <span class="std-name col-style">Email</span>
            <span class="std-name col-style">Mobile</span>
            <span class="std-name col-style">Actions</span>
          </div>

      <div class="form-section update_form_sec hidden">
        <h2 class="heading-text">Update Student</h2>
        <form id="update-form">
          <div class="field">
            <label for="update_student_name">Full Name</label>
            <input
              type="text"
              id="update_student_name"
              name="Name"
              placeholder="Enter your Full Name"
            />
          </div>

          <div class="field">
            <label for="update_student_id">Student ID</label>
            <input
              type="text"
              id="update_student_id"
              name="Student_ID"
              placeholder="Enter Student ID"
            />
          </div>

          <div class="field">
            <label for="update_student_email">Student Email</label>
            <input
              type="email"
              id="update_student_email"
              name="Email"
              placeholder="Enter Student Email"
            />
          </div>

          <div class="field">
            <label for="update_student_mobile">Mobile Number</label>
            <input
              type="tel"
              id="update_student_mobile"
              name="Mobile"

          <button class="btn1" id="update_student_btn">

          </button>
